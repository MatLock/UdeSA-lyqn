services:
  lynq-iam:
    build: ./lynq-iam
    ports:
      - "8080:8080"
      - "8081:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=production
      - DB_URL=jdbc:mysql://mysql:3306/lynq_iam_db
      - DB_USERNAME=${DB_USERNAME:-root}
      - DB_PASSWORD=${DB_PASSWORD:-testpassword123}
      - REDIS_ADDRESS=redis
      - REDIS_PORT=6379
      - REDIS_USERNAME=${REDIS_USERNAME:-}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ACCESS_TOKEN_EXPIRATION_MINUTES=${JWT_ACCESS_TOKEN_EXPIRATION_MINUTES:-15}
      - JWT_REFRESH_TOKEN_EXPIRATION_DAYS=${JWT_REFRESH_TOKEN_EXPIRATION_DAYS:-30}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy

  lynq-app-backend:
    build: ./lynq-app-backend
    ports:
      - "8082:8080"
      - "8083:8081"
    environment:
      - SPRING_PROFILES_ACTIVE=production
      - DB_URL=jdbc:mysql://mysql:3306/lynq_backend_db
      - DB_USERNAME=${DB_USERNAME:-root}
      - DB_PASSWORD=${DB_PASSWORD:-testpassword123}
      - LYNQ_IAM_URL=http://lynq-iam:8080/lynq-iam
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_BUCKET_NAME=${AWS_BUCKET_NAME}
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      lynq-iam:
        condition: service_started

  lynq-app-frontend:
    build:
      context: ./lynq-app-frontend
      args:
        # Vite bakes these at build time; the browser runs on the host, so they
        # point at the host-exposed ports of the IAM and backend services.
        - LYNQ_IAM_BASE_URL=${LYNQ_IAM_BASE_URL:-http://localhost:8080/lynq-iam}
        - LYNQ_BACKEND_BASE_URL=${LYNQ_BACKEND_BASE_URL:-http://localhost:8082/lynq-backend-app}
    ports:
      - "3000:80"
    depends_on:
      - lynq-iam
      - lynq-app-backend

  mysql:
    image: mysql:9.0
    ports:
      - "3306:3306"
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD:-testpassword123}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    command:
      - "redis-server"
      - "--user"
      - "default"
      - "off"
      - "--user"
      - "${REDIS_USERNAME:-root}"
      - "on"
      - ">${REDIS_PASSWORD:-password}"
      - "~*"
      - "&*"
      - "+@all"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "--user", "${REDIS_USERNAME:-root}", "-a", "${REDIS_PASSWORD:-password}", "--no-auth-warning", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mysql_data:
  redis_data:
