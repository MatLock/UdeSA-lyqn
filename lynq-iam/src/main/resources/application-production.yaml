spring:
  application:
    name: lynq-iam
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      idle-timeout: 300000
      connection-timeout: 20000
      max-lifetime: 1200000
  data:
    redis:
      host: ${REDIS_ADDRESS}
      port: ${REDIS_PORT}
      username: ${REDIS_USERNAME}
      password: ${REDIS_PASSWORD}
  jpa:
    properties:
      hibernate:
        proc:
          param_null_passing: true
        ddl-auto: none
        generate_statistics: false
        dialect: org.hibernate.dialect.MySQLDialect
        show_sql: false
  liquibase:
    change-log: classpath:changelog/db.changelog-config.xml

server:
  port: 8080
  servlet:
    context-path: '/lynq-iam'

management:
  server:
    port: 8081
  endpoint:
    health:
      enabled: true
      probes:
        enabled: true
  health:
    livenessState:
      enabled: true
    readinessState:
      enabled: true
  endpoints:
    web:
      exposure:
        include: [ health, prometheus ]
      base-path: /actuator

logging:
  level:
    root: INFO
    com:
      lynq:
        demo: INFO
